[project]
name = "contextsuite-shared"
version = "0.1.0"
description = "Shared contracts, A2A schemas, and types for ContextSuite"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.10,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["contextsuite_shared"]
