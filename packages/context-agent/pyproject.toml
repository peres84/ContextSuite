[project]
name = "contextsuite-context-agent"
version = "0.1.0"
description = "ContextSuite Context Agent — cloud-side orchestration with LangGraph"
requires-python = ">=3.12"
dependencies = [
  "contextsuite-shared",
  "fastapi>=0.115,<1",
  "uvicorn>=0.34,<1",
  "langgraph>=0.3,<1",
  "langchain-google-genai>=2.1,<3",
  "supabase>=2.13,<3",
  "qdrant-client>=1.13,<2",
  "neo4j>=5.28,<6",
  "pydantic-settings>=2.7,<3",
  "httpx>=0.28,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["contextsuite_agent"]

[project.scripts]
context-agent = "contextsuite_agent.server:main"

[tool.uv.sources]
contextsuite-shared = { workspace = true }
