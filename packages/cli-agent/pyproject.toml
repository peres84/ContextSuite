[project]
name = "contextsuite-cli-agent"
version = "0.1.0"
description = "ContextSuite Local Agent Client — runs coding assistant CLIs"
requires-python = ">=3.12"
dependencies = [
  "contextsuite-shared",
  "fastapi>=0.115,<1",
  "uvicorn>=0.34,<1",
  "pydantic-settings>=2.7,<3",
  "httpx>=0.28,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["contextsuite_cli"]

[project.scripts]
cli-agent = "contextsuite_cli.server:main"

[tool.uv.sources]
contextsuite-shared = { workspace = true }
